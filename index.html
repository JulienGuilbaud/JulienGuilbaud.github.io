<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>accueil</title>
    <link rel="stylesheet" href="/style/styleindex.css">
</head>

<body class="">
    <div class="container on">
        <div class="screen">
            <h1 class="title">
                CONNECTION ESTABLISHED-CONNECTION éTABLIE
            </h1>
            <div class="box--outer">
                <div class="box">
                    <div class="box--inner">
                        <div class="content">
                            <div class="holder">
                                <b>bienvenue dans ma page web</b> ---  welcome to my web page
                                <br>
                                <b>merci d'entrer votre mot de passe</b> ---   please enter your password
                                <br>
                                <br>
                                <div class="row">
                                    <div class="col col__left label">
                                        IDENTIFIANT
                                    </div>
                                    <div class="col col__center">
                                        <input type="text" id="login" maxlength="32" value="VISITEUR" readonly>
                                    </div>
                                </div>
                                <form method="post" action="/password">
                                    <div class="row">
                                        <div class="col col__left label">
                                            MOT DE PASSE
                                        </div>
                                        <div class="col col__center">
                                            <input type="password" id="password" name="password" required="required"
                                                placeholder="" data-error="" maxlength="32" autocomplete="new-password"
                                                autofocus="true" />
                                        </div>
                                    </div>
                                    <!-- <b class="flash">ACCESS REFUSé</b> -->
                                    <div class="row">
                                        <button type="submit" id="submit" name="submit">[login]</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
